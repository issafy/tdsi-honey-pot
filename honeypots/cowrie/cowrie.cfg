# Cowrie SSH/Telnet Honeypot Configuration
# See: https://cowrie.readthedocs.io/en/latest/INSTALL.html

[honeypot]
# SSH on port 2222 (map to 22 on host for real traffic)
listen_endpoints = tcp:2222:interface=0.0.0.0

# Telnet on port 2223 (map to 23 on host)
# Uncomment to enable:
# listen_endpoints = tcp:2223:interface=0.0.0.0

# Hostname the honeypot presents
hostname = db-prod-01

# Fake filesystem
share_path = /cowrie/cowrie-git/share/cowrie

# Download limit for wget/curl commands (bytes)
download_limit_size = 1048576

[ssh]
# SSH version string
version = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.4

# Enable password authentication (this is what catches brute-force attacks)
auth_class = auth.passwd

[backend_pool]
# JSON logging — easy to parse and ship to the dashboard
enabled = true

[output_jsonlog]
enabled = true
logfile = /cowrie/cowrie-git/var/log/cowrie/cowrie.json

[output_textlog]
enabled = true
logfile = /cowrie/cowrie-git/var/log/cowrie/cowrie.log
